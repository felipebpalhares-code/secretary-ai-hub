name: felipe-hub

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: felipe-backend
    ports:
      - "8000:8000"
    environment:
      # LLMs (preencha pelo menos um)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # Cofre criptografado (gere uma vez com:
      # docker run --rm python:3.12-slim sh -c "pip install -q cryptography && python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'")
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

      # WhatsApp via Evolution API (opcional — perfil "wa")
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-felipe-hub}
      FELIPE_WHATSAPP_NUMBER: ${FELIPE_WHATSAPP_NUMBER:-}

      # Pluggy Open Finance (opcional)
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID:-}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET:-}
      PLUGGY_BASE_URL: ${PLUGGY_BASE_URL:-https://api.pluggy.ai}

      # Telegram / Discord (opcionais)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}

      # CORS — frontend Next.js
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

      # Banco SQLite — persiste em volume
      DATABASE_PATH: /data/felipe_hub.db
    volumes:
      # Hot reload durante desenvolvimento (opcional — comente em produção)
      - ./backend:/app
      # Banco persistente
      - hub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Evolution API (WhatsApp) — perfil opcional
  # Subir com: docker compose --profile wa up
  evolution:
    image: atendai/evolution-api:homolog
    container_name: felipe-evolution
    ports:
      - "8080:8080"
    profiles: ["wa"]
    depends_on:
      evolution-redis:
        condition: service_started
      evolution-postgres:
        condition: service_started
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: "pt-BR"
      CONFIG_SESSION_PHONE_CLIENT: "Felipe Hub"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET"
      LOG_BAILEYS: "debug"
      LOG_COLOR: "false"

      # Postgres (provider via Prisma)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # Cache Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://evolution-redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: evolution_v2
      CACHE_LOCAL_ENABLED: "false"

      # Webhook (Evolution chama nosso backend quando chega mensagem)
      WEBHOOK_GLOBAL_URL: "http://backend:8000/api/connections/webhooks/whatsapp"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
    volumes:
      - evolution-store:/evolution/store
      - evolution-instances:/evolution/instances
    restart: unless-stopped

  evolution-postgres:
    image: postgres:15-alpine
    container_name: felipe-evolution-postgres
    profiles: ["wa"]
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-redis:
    image: redis:7-alpine
    container_name: felipe-evolution-redis
    profiles: ["wa"]
    volumes:
      - evolution-redis-data:/data
    restart: unless-stopped

volumes:
  hub-data:
  evolution-store:
  evolution-instances:
  evolution-postgres-data:
  evolution-redis-data:
