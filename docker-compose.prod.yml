# Docker Compose de produção · pra rodar na VPS
# Uso: docker compose -f docker-compose.prod.yml --profile wa up -d
name: felipe-hub

services:
  # ── Reverse proxy + HTTPS automático Let's Encrypt ──
  caddy:
    image: caddy:2-alpine
    container_name: felipe-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN_HUB: ${DOMAIN_HUB}
      DOMAIN_API: ${DOMAIN_API}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Frontend Next.js (produção) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
        NEXT_PUBLIC_WS_URL: wss://${DOMAIN_API}
    container_name: felipe-frontend
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
      NEXT_PUBLIC_WS_URL: wss://${DOMAIN_API}
    restart: unless-stopped

  # ── Backend FastAPI ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: felipe-backend
    expose:
      - "8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-felipe-hub}
      FELIPE_WHATSAPP_NUMBER: ${FELIPE_WHATSAPP_NUMBER:-}

      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID:-}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET:-}
      PLUGGY_BASE_URL: ${PLUGGY_BASE_URL:-https://api.pluggy.ai}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}

      CORS_ORIGINS: "https://${DOMAIN_HUB}"
      DATABASE_PATH: /data/felipe_hub.db
    volumes:
      - hub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Evolution API (WhatsApp) — perfil opcional ──
  evolution:
    image: atendai/evolution-api:homolog
    container_name: felipe-evolution
    expose:
      - "8080"
    profiles: ["wa"]
    depends_on:
      evolution-redis:
        condition: service_started
      evolution-postgres:
        condition: service_started
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: "pt-BR"
      CONFIG_SESSION_PHONE_CLIENT: "Felipe Hub"
      CONFIG_SESSION_PHONE_NAME: "Chrome"

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://evolution-redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: evolution_v2

      WEBHOOK_GLOBAL_URL: "http://backend:8000/api/connections/webhooks/whatsapp"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
    volumes:
      - evolution-store:/evolution/store
      - evolution-instances:/evolution/instances
    restart: unless-stopped

  evolution-postgres:
    image: postgres:15-alpine
    container_name: felipe-evolution-postgres
    profiles: ["wa"]
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-redis:
    image: redis:7-alpine
    container_name: felipe-evolution-redis
    profiles: ["wa"]
    volumes:
      - evolution-redis-data:/data
    restart: unless-stopped

volumes:
  hub-data:
  caddy-data:
  caddy-config:
  evolution-store:
  evolution-instances:
  evolution-postgres-data:
  evolution-redis-data:
